services:
  postgres:
    image: postgres:16-alpine
    container_name: meveum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meveum
      POSTGRES_USER: meveum
      POSTGRES_PASSWORD: meveum
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
