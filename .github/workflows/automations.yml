name: Automations

on:
  push:
    branches: [main]
    paths:
      - 'automations/**'
      - '.github/workflows/automations.yml'
  pull_request:
    branches: [main]
    paths:
      - 'automations/**'
      - '.github/workflows/automations.yml'
  workflow_dispatch:

concurrency:
  group: automations-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright - validar estrutura
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: automations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: automations/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar navegador Chromium
        run: npx playwright install --with-deps chromium

      - name: Validar suites de API
        run: npm run test:api -- --pass-with-no-tests
        env:
          CI: true

      - name: Validar suites de frontend
        run: npm run test:frontend -- --pass-with-no-tests
        env:
          CI: true

      - name: Publicar relatorio do Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: automations/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Publicar resultados de teste
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: automations/test-results/
          retention-days: 30
          if-no-files-found: ignore
